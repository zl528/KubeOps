apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeops-frontend
  labels:
    app: kubeops
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeops
      component: frontend
  template:
    metadata:
      labels:
        app: kubeops
        component: frontend
    spec:
      containers:
        - name: frontend
          image: kubeops-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kubeops-frontend
  labels:
    app: kubeops
    component: frontend
spec:
  selector:
    app: kubeops
    component: frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
