apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeops-backend
  labels:
    app: kubeops
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeops
      component: backend
  template:
    metadata:
      labels:
        app: kubeops
        component: backend
    spec:
      serviceAccountName: kubeops
      containers:
        - name: backend
          image: kubeops-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: IN_CLUSTER
              value: "true"
            - name: MODE
              value: "release"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kubeops-backend
  labels:
    app: kubeops
    component: backend
spec:
  selector:
    app: kubeops
    component: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
