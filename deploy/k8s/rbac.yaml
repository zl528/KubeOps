apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeops
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeops
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "services", "events", "configmaps", "secrets", "resourcequotas"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeops
subjects:
  - kind: ServiceAccount
    name: kubeops
    namespace: default
roleRef:
  kind: ClusterRole
  name: kubeops
  apiGroup: rbac.authorization.k8s.io
